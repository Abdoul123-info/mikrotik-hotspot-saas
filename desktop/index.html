<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hotspot Manager Server</title>
    <style>
        :root {
            --primary: #00E5A0;
            --bg: #07090D;
            --card: #0D1117;
            --text: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 160, 0.1);
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--primary);
        }

        .main {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #FF4D4D;
        }

        .status-dot.online {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .btn-start {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: transparent;
            border: 2px solid rgba(0, 229, 160, 0.2);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-start:hover {
            border-color: var(--primary);
            background: rgba(0, 229, 160, 0.05);
            transform: scale(1.05);
        }

        .btn-start.online {
            border-color: var(--primary);
            background: rgba(0, 229, 160, 0.1);
        }

        .btn-label {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-panel {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .info-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
        }

        .qr-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }

        #qr-code {
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon"></div>
            Hotspot Manager <span style="color: var(--text-dim)">Control</span>
        </div>
        <div class="status-badge">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Hors ligne</span>
        </div>
    </div>

    <div class="main">
        <button id="btn-toggle" class="btn-start">
            <svg id="power-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-dim)">
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                <line x1="12" y1="2" x2="12" y2="12"></line>
            </svg>
            <span id="btn-label" class="btn-label" style="color: var(--text-dim)">Start</span>
        </button>

        <div id="info-section" class="info-panel" style="display: none;">
            <div class="info-card">
                <div class="info-label">URL Local</div>
                <div class="info-value">http://localhost:3001</div>
            </div>
            <div class="info-card">
                <div class="info-label">IP Réseau (Mobile)</div>
                <div id="ip-address" class="info-value">1.1.1.102</div>
            </div>
        </div>

        <div id="qr-section" class="qr-section">
            <div id="qr-code"></div>
            <div class="info-label" style="margin-top: 5px;">Scannez pour mobile</div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Hotspot Manager · Version 1.0.0
    </div>

    <script src="renderer.js"></script>
</body>
</html>
